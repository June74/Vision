name: Vision production release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to verify and release
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: vision-production-release
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Run application checks
        run: pnpm check
      - name: Install Chromium for browser smoke coverage
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser smoke coverage
        run: pnpm test:e2e
  deploy:
    name: Release to production
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy release Worker
        run: pnpm exec wrangler deploy --var VISION_ENV:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PRODUCTION }}
