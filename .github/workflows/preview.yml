name: Vision preview

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and deploy
        required: false
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: vision-preview
  cancel-in-progress: true

jobs:
  verify:
    name: Verify preview candidate
    runs-on: ubuntu-latest
    outputs:
      verified_sha: ${{ steps.verified-ref.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - name: Resolve verified commit
        id: verified-ref
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Run application checks
        run: pnpm check
      - name: Install Chromium for browser smoke coverage
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser smoke coverage
        run: pnpm test:e2e
  deploy:
    name: Deploy preview
    needs: verify
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Check preview deployment authorization
        id: preview-token
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PREVIEW }}
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "## Preview deployment blocked" >> "$GITHUB_STEP_SUMMARY"
            echo "CLOUDFLARE_API_TOKEN_PREVIEW is unavailable in the preview environment." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.verify.outputs.verified_sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy isolated preview Worker
        if: ${{ steps.preview-token.outputs.deploy == 'true' }}
        run: pnpm exec wrangler deploy --name vision-preview --var VISION_ENV:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PREVIEW }}
